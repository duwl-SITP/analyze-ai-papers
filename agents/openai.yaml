interface:
  display_name: "AI Paper Analyst"
  short_description: "Analyze AI papers with optional figure/table extraction support"
  default_prompt: "Use $analyze-ai-papers with output_language set to the requested language or the user's primary language by default. Read this paper PDF and produce a structured, detailed technical analysis in a formal written style, covering method, equations, experimental setup, experiments, and limitations. Follow the skill's shared report-contract files for output language, math formatting, paragraph readability, artifact-folder persistence, and the detailed analysis rubric. In Technical Details, explain motivation -> mechanism -> downstream effect without abrupt concept jumps. If the user asks to regenerate, rerun extraction and report generation without reusing prior generated outputs. Include necessary experimental or ablation visualizations when they materially support interpretation. Only extract figures or tables when the user explicitly asks for them or when visual content is necessary to explain architectures, modules, pipelines, qualitative examples, or key tables."
